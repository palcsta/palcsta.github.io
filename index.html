    <main class="container">
        <article class="blog-layout reveal">
            <section class="post-list reveal" id="blog-list">
                <div class="price-chart-card">
                    <div class="price-chart-header">
                        <a href="https://porssisahko.net" target="_blank" rel="noopener noreferrer" style="text-decoration: none; color: inherit;">
                            <span class="section-tag">⚡ Electricity Prices</span>
                        </a>
                        <span class="price-current-value" id="current-price-display">Loading...</span>
                    </div>
                    <div class="price-chart-viz" id="price-chart">
                        <!-- Bars will be injected here -->
                    </div>
                    <div class="weather-chart-row" id="weather-row">
                        <!-- Weather icons/temps will be injected here -->
                    </div>
                    <div class="price-chart-footer">
                        <span id="price-updated-at"></span>
                    </div>
                </div>

                <div class="quote-card reveal" id="quote-container">
                    <div class="quote-content">
                        <p class="quote-text" id="quote-text"></p>
                        <cite class="quote-author" id="quote-author"></cite>
                    </div>
                    <button class="quote-refresh-btn" id="quote-refresh-btn" type="button" aria-label="Load new quote">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        New quote
                    </button>
                </div>

                <div class="post-list-toolbar" style="display: none;">
                    <button id="blog-sort" class="sort-toggle" type="button" aria-label="Toggle blog sort order" data-sort-order="newest">Newest</button>
                </div>

                <div id="dynamic-blog-list" style="display: none;">
                    <!-- Dynamic blog posts will be loaded here -->
                </div>
            </section>

            <aside class="hn-panel reveal" aria-label="Live Hacker News">
                <div class="hn-panel-shell">
                    <div class="hn-panel-header">
                        <span class="section-tag" id="hn-status" aria-live="polite">Live HN</span>
                        <button id="hn-sort-btn" class="hn-sort-btn" type="button" data-sort="points">Points</button>
                    </div>
                    <ol class="hn-story-list" id="hn-story-list"></ol>
                </div>
            </aside>
        </article>
    </main>
