name: Fetch Electricity Prices
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch JSON
        run: |
          curl -s https://api.porssisahko.net/v2/latest-prices.json -o prices.json
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git commit -m "Update electricity prices [skip ci]" || exit 0
          git push
